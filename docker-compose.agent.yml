version: "3.9"

services:
  poc-agentinvest-agent:
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"  
    volumes:
      # Mount a host directory to persist generated reports
      - ./generated_reports:/app/generated_reports
    
    env_file:
      - .env

    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    
    # Override the default command to specify a ticker symbol
    # Usage: docker-compose -f docker-compose.agent.yml run poc-agentinvest-agent MSFT
    command: ["AAPL"]  # Default ticker, can be overridden

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

volumes:
  redis_data:
