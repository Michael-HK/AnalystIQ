services:
  - type: web
    name: analystiq-api
    env: python
    buildCommand: pip install -r requirements.txt && python -m playwright install chromium
    startCommand: uvicorn web_api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: OPENROUTER_MAX_TOKENS
        value: 4000

  - type: static
    name: analystiq-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_ANALYSTIQ_API_BASE
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
