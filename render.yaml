services:
  - type: web
    name: invest-report-workflow
    env: python
    buildCommand: >-
      pip install -r requirements.txt &&
      python -m playwright install chromium &&
      cd frontend &&
      npm ci &&
      VITE_ANALYSTIQ_API_BASE=/api npm run build
    startCommand: uvicorn web_api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: OPENROUTER_MAX_TOKENS
        value: 4000
